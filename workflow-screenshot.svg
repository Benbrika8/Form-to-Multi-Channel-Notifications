<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#1a1a2e"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Form to Multi-Channel Notifications — n8n Workflow</text>
  
  <!-- Webhook Node -->
  <rect x="80" y="200" width="120" height="80" rx="10" fill="#2d2d44" stroke="#ff6b35" stroke-width="2"/>
  <text x="140" y="240" font-family="Arial" font-size="28" fill="#ff6b35" text-anchor="middle">♻</text>
  <text x="140" y="270" font-family="Arial" font-size="11" fill="#cccccc" text-anchor="middle">Webhook</text>
  
  <!-- Arrow 1 -->
  <line x1="200" y1="240" x2="250" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Edit Fields Node -->
  <rect x="250" y="200" width="120" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="310" y="240" font-family="Arial" font-size="28" fill="#7b68ee" text-anchor="middle">✏</text>
  <text x="310" y="270" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">Edit Fields</text>
  
  <!-- Arrows to 3 channels -->
  <line x1="370" y1="225" x2="480" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="240" x2="480" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="255" x2="480" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Gmail Node -->
  <rect x="480" y="100" width="140" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="495" y="115" width="60" height="18" rx="3" fill="#ea4335"/>
  <text x="525" y="127" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Gmail</text>
  <text x="550" y="150" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Send a message</text>
  <text x="550" y="165" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">send: message</text>
  
  <!-- Telegram Node -->
  <rect x="480" y="200" width="140" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <circle cx="520" cy="235" r="18" fill="#229ed9"/>
  <text x="520" y="241" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle">✈</text>
  <text x="570" y="245" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Send Telegram</text>
  <text x="570" y="257" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">sendMessage</text>
  
  <!-- Google Sheets Node -->
  <rect x="480" y="300" width="140" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="495" y="315" width="60" height="18" rx="3" fill="#0f9d58"/>
  <text x="525" y="327" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Sheets</text>
  <text x="550" y="355" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Append row</text>
  <text x="550" y="368" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">in sheet</text>
  
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <text x="450" y="460" font-family="Arial" font-size="12" fill="#888" text-anchor="middle">Built with n8n | Form submissions instantly routed to Gmail, Telegram, and Google Sheets</text>
</svg>
